name: flutter_media_metadata_plus
description: A high-performance Flutter plugin to read metadata and album art of media files.
version: 1.2.0
homepage: https://github.com/PuzzleTakX/flutter_media_metadata_plus
repository: https://github.com/PuzzleTakX/flutter_media_metadata_plus
documentation: https://github.com/PuzzleTakX/flutter_media_metadata_plus/blob/master/README.md

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  js: ^0.7.2
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^2.0.1

flutter:
  plugin:
    platforms:
      android:
        package: com.puzzletakx.flutter_media_metadata_plus
        pluginClass: FlutterMediaMetadataPlugin
      windows:
        pluginClass: FlutterMediaMetadataPlugin
      linux:
        pluginClass: FlutterMediaMetadataPlugin
      ios:
        pluginClass: FlutterMediaMetadataPlugin
      macos:
        pluginClass: FlutterMediaMetadataPlugin
      web:
        pluginClass: MetadataRetriever
        fileName: src/flutter_media_metadata_web.dart
